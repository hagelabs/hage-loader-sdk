<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <title>$GODOT_PROJECT_NAME</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }

      #canvas {
        display: block;
      }
    </style>
    $GODOT_HEAD_INCLUDE
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <script src="hage-loader.js"></script>
    <script src="$GODOT_URL"></script>
    <script>
      (function () {
        var canvas = document.getElementById("canvas");
        var loader = HAGELoader.init({
          productName: "$GODOT_PROJECT_NAME",
          logoUrl: "logo.png",
          subText: "Loading game",
          canvasId: "canvas",
          skipCanvas: true,
          minDisplayMs: 600
        });

        var engine = new Engine($GODOT_CONFIG);

        engine
          .startGame({
            canvas: canvas,
            onProgress: function (current, total) {
              if (typeof current !== "number" || typeof total !== "number" || total <= 0) return;
              loader.setProgress(current / total);
            }
          })
          .then(function () {
            loader.setProgress(1);
            loader.hide();
          })
          .catch(function (err) {
            loader.error("Failed to load. Please refresh.");
            console.error(err);
          });
      })();
    </script>
  </body>
</html>
